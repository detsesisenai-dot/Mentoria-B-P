<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Inteligência B+P & Mentoria</title>
    
    <!-- Tailwind CSS para Estilização -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Configuração Moderna de Módulos (Import Map) -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
            "react-dom": "https://esm.sh/react-dom@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "react-is": "https://esm.sh/react-is@18.2.0",
            "recharts": "https://esm.sh/recharts@2.12.7?external=react,react-dom"
        }
    }
    </script>

    <!-- Babel para compilar JSX direto no navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip as RechartsTooltip, ResponsiveContainer, PieChart, Pie, Cell, Legend, LabelList } from 'recharts';

        const CURRENT_DATE = new Date(2026, 5, 18); 
        const COLORS = ['#0088FE', '#00C49F', '#FFBB28', '#FF8042', '#8884d8', '#82ca9d'];

        const cleanCNPJ = (cnpj) => cnpj ? cnpj.toString().replace(/[^\d]/g, '') : '';

        const parseDate = (dateStr) => {
            if (!dateStr) return null;
            const parts = dateStr.split('/');
            if (parts.length === 3) return new Date(parts[2], parts[1] - 1, parts[0]);
            return null;
        };

        const parseCSV = (text) => {
            const lines = text.split('\n').filter(l => l.trim() !== '');
            if (lines.length === 0) return [];
            
            const delimiter = lines[0].includes(';') ? ';' : ',';
            
            const processLine = (line) => {
                let p = '', row = [''], i = 0, s = !0;
                for (let l of line) {
                    if ('"' === l) { s = !s; } 
                    else if (delimiter === l && s) { l = row[++i] = ''; } 
                    else { row[i] += l; }
                }
                return row.map(v => v.trim().replace(/^"|"$/g, ''));
            };

            const headers = processLine(lines[0]).map(h => h.toUpperCase());
            return lines.slice(1).map(line => {
                const values = processLine(line);
                let obj = {};
                headers.forEach((h, i) => { obj[h] = values[i] || ''; });
                return obj;
            });
        };

        const IconActivity = ({ size = 24, className = "" }) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>);
        const IconUpload = ({ size = 24, className = "" }) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>);
        const IconTarget = ({ size = 24, className = "" }) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle></svg>);
        const IconDownload = ({ size = 24, className = "" }) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>);
        const IconBuilding = ({ size = 24, className = "" }) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect><path d="M9 22v-4h6v4"></path></svg>);
        const IconFilter = ({ size = 24, className = "" }) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>);
        const IconCheck = ({ size = 24, className = "" }) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"></polyline></svg>);
        const IconLayers = ({ size = 24, className = "" }) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>);
        const IconGitMerge = ({ size = 24, className = "" }) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="18" cy="18" r="3"></circle><circle cx="6" cy="6" r="3"></circle><path d="M6 21V9a9 9 0 0 0 9 9"></path></svg>);
        const IconZap = ({ size = 24, className = "" }) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>);
        const IconAlertCircle = ({ size = 24, className = "" }) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>);

        function App() {
            // Estados para Uploads
            const [rawDataBP, setRawDataBP] = useState([]);
            const [rawDataMentoria, setRawDataMentoria] = useState([]);
            const [viewDashboard, setViewDashboard] = useState(false);
            
            // Estados para Filtros Principais
            const [filters, setFilters] = useState({
                porte: '', produto: '', unidade: '', setor: '', consultor: '', regua: '', status: '', qtdAtendimentos: '',
                ciclo: '', mentoria: ''
            });

            // Estado para o Radar Interativo de Oportunidades
            const [radarCycle, setRadarCycle] = useState('Ciclo 1 (2024)');

            // Handlers de Upload
            const handleUploadBP = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => setRawDataBP(parseCSV(event.target.result));
                    reader.readAsText(file);
                }
            };

            const handleUploadMentoria = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => setRawDataMentoria(parseCSV(event.target.result));
                    reader.readAsText(file);
                }
            };

            const { baseCompanies, filterOptions } = useMemo(() => {
                if (!viewDashboard || rawDataBP.length === 0) return { baseCompanies: [], filterOptions: {} };

                const cnpjsMentoria = new Set();
                rawDataMentoria.forEach(row => {
                    const cnpjOriginal = row['CNPJ'] || row['CNPJ EMPRESA'] || row['CPF/CNPJ'] || '';
                    const cnpjLimpo = cleanCNPJ(cnpjOriginal);
                    if (cnpjLimpo) cnpjsMentoria.add(cnpjLimpo);
                });

                const validData = [];
                const productsFrequency = {};
                const sectorProducts = {};
                const statusSet = new Set();

                rawDataBP.forEach(row => {
                    const status = row['STATUS'] || '';
                    const produto = row['PRODUTO NACIONAL'] || '';
                    if (status === 'Arquivado' || status === 'Contrato Cancelado') return;
                    if (produto.toUpperCase().includes('PILOTO')) return;
                    if (!produto) return;

                    validData.push(row);
                    statusSet.add(status);
                    productsFrequency[produto] = (productsFrequency[produto] || 0) + 1;
                    
                    const setor = row['SETOR'] || 'Outros';
                    if (!sectorProducts[setor]) sectorProducts[setor] = {};
                    sectorProducts[setor][produto] = (sectorProducts[setor][produto] || 0) + 1;
                });

                const companiesMap = {};
                validData.forEach(row => {
                    const cnpjOriginal = row['CNPJ'];
                    const cnpjLimpo = cleanCNPJ(cnpjOriginal);
                    if (!cnpjLimpo) return;

                    if (!companiesMap[cnpjLimpo]) {
                        companiesMap[cnpjLimpo] = {
                            cnpj: cnpjOriginal,
                            cnpjLimpo: cnpjLimpo,
                            cliente: row['CLIENTE'] || row['RAZÃO SOCIAL'],
                            porte: row['PORTE CONTRATAÇÃO'] || row['PORTE RECEITA'],
                            setor: row['SETOR'], 
                            unidade: row['UNIDADE'], 
                            consultores: row['CONSULTORES'] || '',
                            atendimentos: [], 
                            receitaTotal: 0,
                            temMentoria: cnpjsMentoria.has(cnpjLimpo) ? 'Sim' : 'Não'
                        };
                    }
                    companiesMap[cnpjLimpo].receitaTotal += parseFloat(row['RECEITA PREVISTA'] || 0);
                    companiesMap[cnpjLimpo].atendimentos.push({
                        id: row['ID'], status: row['STATUS'], produto: row['PRODUTO NACIONAL'],
                        dataInicio: parseDate(row['DATA DE INÍCIO PREVISTA'] || row['DATA DE EXECUÇÃO']),
                        dataConclusao: parseDate(row['DATA DE CONCLUSÃO'] || row['DATA DE ENCERRAMENTO TÉCNICO']),
                        dataAceitacao: parseDate(row['DATA DE ACEITAÇÃO'])
                    });
                });

                const companies = Object.values(companiesMap).map(company => {
                    const atendimentos = company.atendimentos;
                    const qtdAtendimentos = atendimentos.length;
                    const concluidos = atendimentos.filter(a => a.status === 'Concluído');
                    const iniciados2026 = atendimentos.filter(a => a.dataInicio && a.dataInicio.getFullYear() === 2026);

                    const ciclosSet = new Set();
                    atendimentos.forEach(a => {
                        if (a.dataAceitacao) {
                            const ano = a.dataAceitacao.getFullYear();
                            if (ano === 2024) ciclosSet.add('Ciclo 1 (2024)');
                            else if (ano === 2025) ciclosSet.add('Ciclo 2 (2025)');
                            else if (ano === 2026) ciclosSet.add('Ciclo 3 (2026)');
                        }
                    });
                    company.ciclos = Array.from(ciclosSet).sort();
                    company.cicloPrincipal = company.ciclos.length > 0 ? company.ciclos[company.ciclos.length - 1] : 'Sem Ciclo Definido';

                    let regua = 'Cliente Ativo';
                    if (qtdAtendimentos > 2) regua = 'Ex-cliente B+P';
                    else if (qtdAtendimentos === 1 && iniciados2026.length === 1) regua = 'Novo Cliente';
                    else if (concluidos.length === 1) regua = 'Ex-cliente';

                    company.regua = regua;
                    company.qtdAtendimentos = qtdAtendimentos;
                    company.qtdAtendimentosStr = qtdAtendimentos >= 4 ? '4 ou mais' : qtdAtendimentos.toString();
                    company.produtosAdquiridos = atendimentos.map(a => a.produto);
                    company.allStatuses = [...new Set(atendimentos.map(a => a.status))];

                    const setorData = sectorProducts[company.setor] || productsFrequency;
                    const sortedSectorProducts = Object.entries(setorData).sort((a, b) => b[1] - a[1]);
                    
                    let recomendacao = 'Nenhuma (Possui todos os principais)';
                    for (let [prod] of sortedSectorProducts) {
                        if (!company.produtosAdquiridos.includes(prod)) {
                            recomendacao = prod; break;
                        }
                    }
                    company.recomendacao = recomendacao;
                    return company;
                });

                const consultoresLimpos = new Set();
                companies.forEach(c => {
                    if(c.consultores) c.consultores.split(';').forEach(n => { if(n.trim()) consultoresLimpos.add(n.trim()); });
                });

                const opts = {
                    regua: ['Ex-cliente B+P', 'Ex-cliente', 'Novo Cliente', 'Cliente Ativo'],
                    porte: [...new Set(companies.map(c => c.porte).filter(Boolean))],
                    setor: [...new Set(companies.map(c => c.setor).filter(Boolean))],
                    unidade: [...new Set(companies.map(c => c.unidade).filter(Boolean))],
                    produto: Object.keys(productsFrequency),
                    consultor: Array.from(consultoresLimpos).sort(),
                    status: [...statusSet],
                    qtdAtendimentos: ['1', '2', '3', '4 ou mais'],
                    ciclo: ['Ciclo 1 (2024)', 'Ciclo 2 (2025)', 'Ciclo 3 (2026)', 'Sem Ciclo Definido'],
                    mentoria: ['Sim', 'Não']
                };

                return { baseCompanies: companies, filterOptions: opts };
            }, [rawDataBP, rawDataMentoria, viewDashboard]);

            // Lógica exclusiva para a análise de conversão em mentoria por ciclos
            const radarData = useMemo(() => {
                if (!baseCompanies) return { targets: [], totalCiclo: 0 };
                
                // Pega as empresas que pertencem ao ciclo selecionado
                const doCiclo = baseCompanies.filter(c => 
                    radarCycle === 'Todos os Ciclos' ? c.ciclos.length > 0 : c.ciclos.includes(radarCycle)
                );

                // Filtra as que AINDA NÃO receberam mentoria
                const semMentoria = doCiclo.filter(c => c.temMentoria === 'Não');
                
                // Ordena por maior engajamento (quem já fez mais coisas na B+P tem mais chance)
                semMentoria.sort((a, b) => b.qtdAtendimentos - a.qtdAtendimentos || b.receitaTotal - a.receitaTotal);

                return {
                    totalCiclo: doCiclo.length,
                    targets: semMentoria
                };
            }, [baseCompanies, radarCycle]);

            const displayCompanies = useMemo(() => {
                if (!baseCompanies) return [];
                return baseCompanies.filter(c => {
                    if (filters.porte && c.porte !== filters.porte) return false;
                    if (filters.setor && c.setor !== filters.setor) return false;
                    if (filters.unidade && c.unidade !== filters.unidade) return false;
                    if (filters.regua && c.regua !== filters.regua) return false;
                    if (filters.consultor && !c.consultores.includes(filters.consultor)) return false;
                    if (filters.produto && !c.produtosAdquiridos.includes(filters.produto)) return false;
                    if (filters.status && !c.allStatuses.includes(filters.status)) return false;
                    if (filters.qtdAtendimentos && c.qtdAtendimentosStr !== filters.qtdAtendimentos) return false;
                    if (filters.mentoria && c.temMentoria !== filters.mentoria) return false;
                    if (filters.ciclo && !c.ciclos.includes(filters.ciclo) && c.cicloPrincipal !== filters.ciclo) return false;
                    return true;
                }).sort((a, b) => b.receitaTotal - a.receitaTotal);
            }, [baseCompanies, filters]);

            const { metrics, chartsData } = useMemo(() => {
                if (!displayCompanies || displayCompanies.length === 0) {
                    return { 
                        metrics: { totalBase: baseCompanies?.length || 0, totalCrossSell: 0, taxaCrossSell: 0, mediaCom: 0, mediaSem: 0, aumentoLTV: 0 }, 
                        chartsData: { setor: [], ciclos: [], crossSell: [], consultoresMentoria: [], comparativoPorte: [] } 
                    };
                }

                const setorCount = {}; const consultorMentoriaCount = {};
                const cicloCount = { 
                    'Ciclo 1 (2024)': { com: 0, sem: 0 }, 
                    'Ciclo 2 (2025)': { com: 0, sem: 0 }, 
                    'Ciclo 3 (2026)': { com: 0, sem: 0 }, 
                    'Sem Ciclo Definido': { com: 0, sem: 0 } 
                };
                let comMentoria = 0, sumAtendimentosCom = 0, sumAtendimentosSem = 0;
                let porteStats = {};

                displayCompanies.forEach(c => {
                    setorCount[c.setor] = (setorCount[c.setor] || 0) + 1;
                    
                    const p = c.porte || 'Não Informado';
                    if(!porteStats[p]) porteStats[p] = { porte: p, total: 0, com: 0 };
                    porteStats[p].total++;

                    if (c.temMentoria === 'Sim') {
                        comMentoria++;
                        sumAtendimentosCom += c.qtdAtendimentos;
                        porteStats[p].com++;

                        if(c.consultores) {
                            c.consultores.split(';').forEach(nome => {
                                const n = nome.trim();
                                if(n) consultorMentoriaCount[n] = (consultorMentoriaCount[n] || 0) + 1;
                            });
                        }
                    } else {
                        sumAtendimentosSem += c.qtdAtendimentos;
                    }

                    c.ciclos.forEach(ciclo => { 
                        if (cicloCount[ciclo] !== undefined) {
                            c.temMentoria === 'Sim' ? cicloCount[ciclo].com++ : cicloCount[ciclo].sem++;
                        }
                    });
                    if (c.ciclos.length === 0) {
                        c.temMentoria === 'Sim' ? cicloCount['Sem Ciclo Definido'].com++ : cicloCount['Sem Ciclo Definido'].sem++;
                    }
                });

                const countSem = displayCompanies.length - comMentoria;
                let medCom = comMentoria > 0 ? (sumAtendimentosCom / comMentoria) : 0;
                let medSem = countSem > 0 ? (sumAtendimentosSem / countSem) : 0;
                let pctAumento = (medSem > 0 && medCom > medSem) ? ((medCom / medSem) - 1) * 100 : 0;

                const chartsData = {
                    setor: Object.entries(setorCount).map(([name, value]) => ({ name: name.substring(0,25)+'...', full: name, value })).sort((a,b) => b.value - a.value).slice(0, 10),
                    ciclos: Object.entries(cicloCount).filter(([_, v]) => v.com > 0 || v.sem > 0).map(([name, value]) => ({ name, 'Com Mentoria': value.com, 'Precisa de Mentoria': value.sem })),
                    consultoresMentoria: Object.entries(consultorMentoriaCount).map(([name, value]) => ({ name: name.split(' ')[0] + ' ' + (name.split(' ')[1]||''), full: name, value })).sort((a,b) => b.value - a.value).slice(0, 10),
                    crossSell: [
                        { name: 'Com Mentoria', value: comMentoria },
                        { name: 'Precisa de Mentoria', value: countSem }
                    ],
                    comparativoPorte: Object.values(porteStats).map(p => ({
                        name: p.porte, 'Mentoria': p.com, 'Apenas B+P': p.total - p.com
                    })).sort((a,b) => b['Mentoria'] - a['Mentoria'])
                };

                const metrics = {
                    totalBase: baseCompanies.length,
                    totalCrossSell: comMentoria,
                    taxaCrossSell: ((comMentoria / displayCompanies.length) * 100).toFixed(1),
                    mediaCom: medCom.toFixed(1),
                    mediaSem: medSem.toFixed(1),
                    aumentoLTV: pctAumento.toFixed(0)
                };

                return { metrics, chartsData };
            }, [displayCompanies, baseCompanies]);

            const exportToCSV = (dataList, fileName) => {
                let csvContent = "\uFEFFCNPJ;CLIENTE;PORTE;SETOR;CONSULTORES;CICLOS (ACEITAÇÃO);RECEBEU MENTORIA;RÉGUA RELACIONAMENTO;PRODUTOS JÁ ADQUIRIDOS;PRODUTO RECOMENDADO\n";
                dataList.forEach(c => {
                    const row = [
                        c.cnpj, `"${c.cliente || ''}"`, `"${c.porte || ''}"`, `"${c.setor || ''}"`, `"${c.consultores || ''}"`,
                        `"${c.ciclos.join(', ') || c.cicloPrincipal}"`, c.temMentoria, c.regua, 
                        `"${c.produtosAdquiridos.join(', ')}"`, `"${c.recomendacao}"`
                    ];
                    csvContent += row.join(";") + "\n";
                });
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = fileName;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            if (!viewDashboard) {
                return (
                    <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-4">
                        <div className="max-w-2xl w-full bg-white rounded-2xl shadow-xl p-8 border border-slate-100">
                            <div className="text-center mb-8">
                                <div className="w-16 h-16 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4 transform rotate-3">
                                    <IconActivity size={32} />
                                </div>
                                <h1 className="text-3xl font-bold text-slate-800 mb-2">Motor de Inteligência B+P</h1>
                                <p className="text-slate-500">Cruze dados de Consultoria e Mentoria para gerar insights estratégicos.</p>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                                {/* Upload 1: Atendimentos B+P */}
                                <div className={`p-6 rounded-xl border-2 transition-all ${rawDataBP.length > 0 ? 'border-green-500 bg-green-50' : 'border-dashed border-slate-300 bg-slate-50 hover:border-blue-400'}`}>
                                    <div className="flex items-center gap-3 mb-3">
                                        <div className={`p-2 rounded-lg ${rawDataBP.length > 0 ? 'bg-green-100 text-green-600' : 'bg-blue-100 text-blue-600'}`}>
                                            {rawDataBP.length > 0 ? <IconCheck size={20}/> : <IconBuilding size={20}/>}
                                        </div>
                                        <h3 className="font-semibold text-slate-700">Planilha B+P</h3>
                                    </div>
                                    <p className="text-sm text-slate-500 mb-4 h-10">Obrigatório. Relatório de Atendimentos B+P (CSV).</p>
                                    <label className={`cursor-pointer font-medium py-2 px-4 rounded-lg flex items-center justify-center gap-2 w-full transition-colors ${rawDataBP.length > 0 ? 'bg-white text-green-700 border border-green-200 shadow-sm' : 'bg-blue-600 hover:bg-blue-700 text-white'}`}>
                                        <IconUpload size={18} /> {rawDataBP.length > 0 ? 'Substituir Arquivo' : 'Carregar CSV'}
                                        <input type="file" accept=".csv" className="hidden" onChange={handleUploadBP} />
                                    </label>
                                </div>

                                {/* Upload 2: Mentoria */}
                                <div className={`p-6 rounded-xl border-2 transition-all ${rawDataMentoria.length > 0 ? 'border-green-500 bg-green-50' : 'border-dashed border-slate-300 bg-slate-50 hover:border-purple-400'}`}>
                                    <div className="flex items-center gap-3 mb-3">
                                        <div className={`p-2 rounded-lg ${rawDataMentoria.length > 0 ? 'bg-green-100 text-green-600' : 'bg-purple-100 text-purple-600'}`}>
                                            {rawDataMentoria.length > 0 ? <IconCheck size={20}/> : <IconGitMerge size={20}/>}
                                        </div>
                                        <h3 className="font-semibold text-slate-700">Planilha Mentoria</h3>
                                    </div>
                                    <p className="text-sm text-slate-500 mb-4 h-10">Opcional. Relatório de Processos ou Alunos (CSV).</p>
                                    <label className={`cursor-pointer font-medium py-2 px-4 rounded-lg flex items-center justify-center gap-2 w-full transition-colors ${rawDataMentoria.length > 0 ? 'bg-white text-green-700 border border-green-200 shadow-sm' : 'bg-purple-600 hover:bg-purple-700 text-white'}`}>
                                        <IconUpload size={18} /> {rawDataMentoria.length > 0 ? 'Substituir Arquivo' : 'Carregar CSV'}
                                        <input type="file" accept=".csv" className="hidden" onChange={handleUploadMentoria} />
                                    </label>
                                </div>
                            </div>

                            <button 
                                onClick={() => setViewDashboard(true)}
                                disabled={rawDataBP.length === 0}

                                                <td className="p-4">
                                                    <div className="flex flex-col gap-1.5 items-start">
                                                        <span className={`px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wider ${company.regua === 'Ex-cliente B+P' ? 'bg-purple-100 text-purple-700' : company.regua === 'Ex-cliente' ? 'bg-amber-100 text-amber-700' : company.regua === 'Novo Cliente' ? 'bg-emerald-100 text-emerald-700' : 'bg-blue-100 text-blue-700'}`}>{company.regua}</span>
                                                        {company.cicloPrincipal !== 'Sem Ciclo Definido' && <span className="text-[10px] text-slate-500 border border-slate-200 px-1.5 rounded">{company.cicloPrincipal}</span>}
                                                    </div>
                                                </td>
                                                <td className="p-4">
                                                    <div className="flex flex-wrap gap-1">
                                                        {company.produtosAdquiridos.slice(0,2).map((p, i) => <span key={i} className="text-[10px] bg-slate-100 border border-slate-200 px-1.5 py-0.5 rounded truncate max-w-[120px]" title={p}>{p.replace('NOVO B+P ', '')}</span>)}
                                                        {company.produtosAdquiridos.length > 2 && <span className="text-[10px] bg-slate-100 px-1.5 py-0.5 rounded">+{company.produtosAdquiridos.length - 2}</span>}
                                                    </div>
                                                </td>
                                                <td className="p-4 bg-blue-50/20 font-medium text-blue-700 text-xs">
                                                    {company.recomendacao}
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                                {displayCompanies.length > 50 && (
                                    <div className="p-4 text-center text-sm text-slate-500 bg-slate-50 border-t border-slate-100">
                                        Mostrando as 50 primeiras empresas. Exporte para Excel para visualizar as {displayCompanies.length} resultantes do filtro global.
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
